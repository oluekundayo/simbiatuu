<section class="blog-author-card">
  <img [src]="author.avatar" [alt]="author.name" />
  <div class="blog-author-copy">
    <p class="blog-author-label">Written by</p>
    <h2>{{ author.name }}</h2>
    <p class="blog-author-role">{{ author.role }}</p>
    <p class="blog-author-bio">{{ author.bio }}</p>
  </div>
  <div class="blog-author-meta">
    <span>{{ publishedAt }}</span>
    <span>{{ readTime }}</span>
  </div>
</section>
